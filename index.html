<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.A.BADMINTON - จองสนาม</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: var(--main); text-align: center; margin-bottom: 20px; }
        .step { margin-bottom: 15px; }
        label { font-weight: bold; color: #444; display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .price-box { background: #e9f7ef; padding: 15px; border-radius: 10px; text-align: center; margin: 20px 0; border: 1px solid var(--main); }
        .total-amt { font-size: 28px; color: #d9534f; font-weight: bold; }
        .btn-booking { background: var(--main); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏸 เอ็นเอ แบดมินตัน</h2>
    <div class="step">
        <label>🏟️ 1. เลือกสนาม</label>
        <select id="court" onchange="updateAvailableSlots()">
    <option value="สนามที่ 1">สนามที่ 1</option>
    <option value="สนามที่ 2">สนามที่ 2</option>
        </select>
    </div>

    <div class="step">
        <label>📅 2. เลือกวันที่จอง</label>
        <input type="date" id="date" onchange="updateAvailableSlots()">
    </div>

    <div class="step">
        <label>⏰ 3. เวลาที่ว่าง</label>
        <select id="time" onchange="calculatePrice()">
            <option value="">-- กรุณาเลือกวันที่ --</option>
        </select>
    </div>

    <div class="step">
        <label>⏳ 4. จำนวนชั่วโมง</label>
        <select id="hours" onchange="calculatePrice()">
            <option value="1">1 ชั่วโมง</option>
            <option value="2">2 ชั่วโมง</option>
            <option value="3">3 ชั่วโมง</option>
        </select>
    </div>

    <div class="price-box">
        ราคาต่อชั่วโมง: <span id="rate">0</span> บาท<br>
        <small>ยอดรวมที่ต้องโอน</small><br>
        <span class="total-amt" id="total-price">0</span> บาท
    </div>

    <button class="btn-booking" onclick="submitBooking()">💰 จองและรับ QR Code</button>
</div>

<script>
    // --- แก้ไข 3 จุดนี้ ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx4e2SZayZZ8v7eh1U5mXQVtL6Za0Dxj8tuqRkzzVHrdILG7ZFvPwpZJdGGRs5GxSz3/exec"; 
    const LIFF_ID = "2009744682-lDeX6hEz";
    const QR_CODE_URL = "https://aujnaaka-prog.github.io/Badminton-booking-/line_oa_chat_260408_225525.jpeg"; 

    let userName = "";

    async function init() {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            userName = profile.displayName;
        } else { liff.login(); }
    }

    async function updateAvailableSlots() {
        const date = document.getElementById('date').value;
        const court = document.getElementById('court').value;
        const timeSelect = document.getElementById('time');
        if (!date) return;
        
        timeSelect.innerHTML = '<option>กำลังเช็คสนามว่าง...</option>';
        try {
            const res = await fetch(`${GAS_URL}?date=${date}&court=${court}`);
            const bookedSlots = await res.json();
            timeSelect.innerHTML = '';
            
            for (let h = 6; h <= 23; h++) {
                const isBooked = bookedSlots.some(slot => h >= slot.start && h < slot.end);
                if (!isBooked) {
                    let display = (h < 10 ? '0'+h : h) + ':00';
                    timeSelect.innerHTML += `<option value="${display}">${display} น.</option>`;
                }
            }
            calculatePrice();
        } catch (e) { alert('โหลดข้อมูลไม่สำเร็จ'); }
    }

    function calculatePrice() {
        const dateVal = document.getElementById('date').value;
        const timeVal = document.getElementById('time').value;
        const hours = parseInt(document.getElementById('hours').value);
        if(!dateVal || !timeVal) return;

        const date = new Date(dateVal);
        const day = date.getDay(); 
        const hour = parseInt(timeVal.split(':')[0]);
        let rate = 160; 

        if (hour >= 6 && hour <= 16) {
            rate = (day >= 1 && day <= 5) ? 120 : 140;
        }
        document.getElementById('rate').innerText = rate;
        document.getElementById('total-price').innerText = rate * hours;
    }

    async function submitBooking() {
        const data = {
            date: document.getElementById('date').value,
            time: document.getElementById('time').value,
            hours: document.getElementById('hours').value,
            court: document.getElementById('court').value,
            userName: userName
        };
        const total = document.getElementById('total-price').innerText;

        if(!data.date || !data.time) return alert('กรุณาระบุวันเวลาให้ครบค่ะ');

        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
            if(res.ok) {
                await liff.sendMessages([
                    {
                        type: 'text',
                        text: `🎾 จองสนาม: ${data.court}\n👤 คุณ: ${userName}\n📅 วันที่: ${data.date}\n⏰ เวลา: ${data.time} (${data.hours} ชม.)\n💰 ยอดโอน: ${total} บาท\n\n✅ จองสำเร็จ! กรุณาโอนเงินตาม QR Code และแนบสลิปในแชทนี้นะคะ`
                    },
                    {
                        type: 'image',
                        originalContentUrl: QR_CODE_URL,
                        previewImageUrl: QR_CODE_URL
                    }
                ]);
                liff.closeWindow();
            }
        } catch(e) { alert('เกิดข้อผิดพลาด'); }
    }

    init();
</script>
</body>
</html>
